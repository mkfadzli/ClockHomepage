# Nginx — Alarm Timer (Firefox Homepage)
#
# Serves the static Vite build with:
#   - Gzip compression
#   - Cache headers for hashed assets
#   - Health check endpoint at /health
#   - SPA fallback (all routes → index.html)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security: don't advertise Nginx version
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/html text/css application/javascript image/svg+xml;

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Hashed assets — cache aggressively (fingerprinted filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files with sensible cache
    location ~* \.(js|css|svg|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
